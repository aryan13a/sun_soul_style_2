<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="sun-soul-logo">
  <!-- Sun rays -->
  <g class="sun-rays" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <line x1="50" y1="20" x2="50" y2="10" />
    <line x1="35" y1="25" x2="28" y2="18" />
    <line x1="65" y1="25" x2="72" y2="18" />
    <line x1="25" y1="38" x2="16" y2="34" />
    <line x1="75" y1="38" x2="84" y2="34" />
  </g>
  <!-- Sun disc (half sun rising) -->
  <path d="M 30,50 A 20,20 0 0 1 70,50" fill="#D9A05B" />
  <!-- Layered mountains/waves (horizon) -->
  <!-- Back hill (terracotta) -->
  <path d="M 10,65 Q 35,55 60,68 T 90,62 L 90,90 L 10,90 Z" fill="#C86B55" opacity="0.85" />
  <!-- Front hill (olive) -->
  <path d="M 10,75 Q 45,62 80,78 T 90,75 L 90,90 L 10,90 Z" fill="#6E7259" />
  <!-- Base frame line -->
  <line x1="10" y1="90" x2="90" y2="90" stroke="#5C4033" stroke-width="2" stroke-linecap="round" />
</svg>
